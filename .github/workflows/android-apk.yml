name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Print environment
        run: |
          echo "==== node ===="
          node -v
          echo "==== npm ===="
          npm -v
          echo "==== java ===="
          java -version
          echo "==== ANDROID_HOME ===="
          echo "$ANDROID_HOME"
          echo "==== sdkmanager packages ===="
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed || true

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Print Gradle / AGP versions
        working-directory: android
        run: |
          ./gradlew --version | tee ../gradle-version.log

      - name: Build debug APK
        working-directory: android
        id: build
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../gradle-build.log

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: |
            gradle-build.log
            gradle-version.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: huabei-jianwei-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
